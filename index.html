<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>document.documentElement.setAttribute("data-gb",window.matchMedia("(max-width:520px)").matches?"closed":"open");</script>
<title>RoamWiki — Launching soon</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="description" content="RoamWiki — the travel wiki for everyone, everywhere. Launching soon." />
<meta property="og:title" content="RoamWiki — Launching soon" />
<meta property="og:description" content="A community-built travel guide to every city on earth. Launching soon." />
<meta property="og:type" content="website" />
<style>
  :root{
    --ink:#0a0b12;
    --ink-2:#0e1019;
    --fg:#f6f3ee;
    --fg-muted:#b7b1a8;
    --fg-subtle:#7d7970;
    --line:rgba(255,255,255,.10);
    --o1:#FF6B35;
    --o2:#F7931E;
    --o3:#FFD700;
    --grad:linear-gradient(105deg,var(--o1),var(--o2) 55%,var(--o3));
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--ink);
    color:var(--fg);
    font-family:"Plus Jakarta Sans",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }
  /* ── Atmosphere: night sky + horizon dawn ── */
  .sky{position:fixed;inset:0;z-index:0;overflow:hidden}
  .sky::before{ /* deep sky wash */
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(120% 90% at 50% -10%, #171a2b 0%, var(--ink-2) 42%, var(--ink) 72%);
  }
  .dawn{ /* warm horizon glow, slow drift */
    position:absolute;left:50%;bottom:-38vh;width:150vw;height:95vh;
    transform:translateX(-50%);
    background:
      radial-gradient(closest-side, rgba(255,183,77,.42), rgba(247,147,30,.20) 45%, rgba(255,107,53,0) 72%);
    filter:blur(28px);
    animation:breathe 13s ease-in-out infinite;
  }
  .aurora{ /* faint upper color veil */
    position:absolute;left:50%;top:-24vh;width:120vw;height:70vh;transform:translateX(-50%);
    background:
      radial-gradient(closest-side, rgba(103,90,220,.20), rgba(48,207,208,.10) 55%, transparent 75%);
    filter:blur(40px);
    animation:sway 19s ease-in-out infinite;
  }
  .grain{ /* subtle vignette to seat the type */
    position:absolute;inset:0;
    background:radial-gradient(130% 100% at 50% 42%, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  /* ── Roaming orbit motif behind wordmark ── */
  .orbit{
    position:absolute;left:50%;top:44%;width:min(78vw,760px);aspect-ratio:1;
    transform:translate(-50%,-50%) rotate(0deg);
    border:1px dashed rgba(255,255,255,.09);border-radius:50%;
    animation:spin 60s linear infinite;
  }
  .orbit::after{ /* the roaming dot */
    content:"";position:absolute;top:-4px;left:50%;width:8px;height:8px;margin-left:-4px;
    border-radius:50%;background:var(--o3);box-shadow:0 0 14px 2px rgba(255,215,0,.6);
  }
  .orbit.inner{width:min(56vw,540px);border-color:rgba(255,255,255,.06);animation-duration:42s;animation-direction:reverse}
  .orbit.inner::after{background:var(--o1);box-shadow:0 0 12px 2px rgba(255,107,53,.55)}

  /* ── Content ── */
  main{
    position:relative;z-index:2;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(20px,3.4vh,34px);
    padding:40px 24px;text-align:center;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:9px;
    padding:7px 15px 7px 12px;border-radius:999px;
    border:1px solid var(--line);background:rgba(255,255,255,.04);
    font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--fg-muted);backdrop-filter:blur(6px);
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--o2);
    box-shadow:0 0 0 0 rgba(247,147,30,.55);animation:pulse 2.4s ease-out infinite}

  .wordmark{
    margin:0;font-weight:800;line-height:.92;letter-spacing:-.035em;
    font-size:clamp(52px,13.5vw,150px);
    text-wrap:balance;
  }
  .wordmark .roam{
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-fill-color:transparent;
  }
  .wordmark .wiki{color:var(--fg)}

  .tagline{
    margin:0;max-width:22ch;
    font-size:clamp(19px,2.5vw,28px);font-weight:600;line-height:1.28;letter-spacing:-.01em;
    color:var(--fg);text-wrap:balance;
  }
  .sub{
    margin:0;max-width:52ch;
    font-size:clamp(14.5px,1.6vw,17px);line-height:1.6;color:var(--fg-muted);
  }

  /* multilingual "coming soon" rotator */
  .rotator{
    display:inline-flex;align-items:baseline;gap:.5ch;
    font-size:clamp(14px,1.7vw,17px);font-weight:600;color:var(--fg-subtle);
    letter-spacing:.01em;
    line-height:1.6;min-height:1.6em;white-space:nowrap;
  }
  .rotator .label{color:var(--fg-subtle)}
  .rotator .word{
    position:relative;min-width:9ch;text-align:left;color:var(--o2);
    line-height:1.6;white-space:nowrap;
    transition:opacity .5s ease, transform .5s ease;
  }
  .rotator .word.out{opacity:0;transform:translateY(6px)}

  footer{
    position:fixed;left:0;right:0;bottom:0;z-index:2;
    display:flex;justify-content:center;gap:18px;align-items:center;
    padding:22px 24px;font-size:12.5px;letter-spacing:.08em;color:var(--fg-subtle);
  }
  footer .site{color:var(--fg-muted);font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  footer .sep{opacity:.4}

  @keyframes breathe{0%,100%{opacity:.85;transform:translateX(-50%) translateY(0) scale(1)}
    50%{opacity:1;transform:translateX(-50%) translateY(-3vh) scale(1.05)}}
  @keyframes sway{0%,100%{opacity:.7;transform:translateX(-52%)}50%{opacity:1;transform:translateX(-48%)}}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(247,147,30,.5)}70%{box-shadow:0 0 0 8px rgba(247,147,30,0)}100%{box-shadow:0 0 0 0 rgba(247,147,30,0)}}

  @media (prefers-reduced-motion: reduce){
    .dawn,.aurora,.orbit,.eyebrow .dot{animation:none}
    .rotator .word{transition:none}
  }

  /* ── Guestbook board ── */
  .board{position:fixed;left:16px;top:16px;z-index:5;display:flex;flex-direction:column;
    width:min(92vw,340px);max-height:min(72vh,540px);overflow:hidden;
    border:1px solid var(--line);border-radius:18px;background:rgba(18,20,32,.58);
    backdrop-filter:saturate(160%) blur(18px);box-shadow:0 18px 50px -12px rgba(0,0,0,.6)}
  .board-head{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    margin:0;padding:13px 16px;border:0;background:transparent;cursor:pointer;text-align:left;font:inherit;color:inherit}
  .board-head-text{display:flex;flex-direction:column;gap:2px;min-width:0}
  .board-title{font-size:14px;font-weight:700;color:var(--fg)}
  .board-sub{font-size:12px;line-height:1.35;color:var(--fg-subtle)}
  .board-chevron{flex:none;font-size:13px;color:var(--fg-subtle);transition:transform .2s ease,color .2s ease}
  .board-head:hover .board-chevron{color:var(--fg)}
  .board-body{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;overflow:hidden}
  :root[data-gb="closed"] .board-body{display:none}
  :root[data-gb="closed"] .board-chevron{transform:rotate(-90deg)}
  .board-form{padding:12px 16px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--line)}
  .board-input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);
    background:rgba(255,255,255,.05);color:var(--fg);font:inherit;font-size:13.5px;line-height:1.45;
    resize:none;outline:none;transition:border-color .18s ease,background .18s ease}
  .board-input::placeholder{color:var(--fg-subtle)}
  .board-input:focus{border-color:rgba(247,147,30,.55);background:rgba(255,255,255,.07)}
  .board-input.err{border-color:rgba(255,107,53,.85)}
  .board-hp{position:absolute!important;left:-9999px!important;width:1px;height:1px;opacity:0}
  .board-row{display:flex;align-items:center;gap:8px}
  .board-row .board-input{flex:1}
  .board-send{flex:none;padding:9px 16px;cursor:pointer;border:0;border-radius:999px;background:var(--grad);
    color:#1a1206;font:inherit;font-size:13px;font-weight:700;box-shadow:0 8px 20px -6px rgba(247,147,30,.5);
    transition:transform .2s ease,filter .2s ease}
  .board-send:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .board-send:disabled{opacity:.55;cursor:default;transform:none}
  .board-list{flex:1 1 auto;min-height:0;overflow-y:auto;padding:10px 16px 14px;display:flex;flex-direction:column;gap:9px}
  .board-empty{margin:6px 0;font-size:12.5px;color:var(--fg-subtle);text-align:center}
  .note{padding:9px 11px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
  .note.mine{border-color:rgba(247,147,30,.4);background:rgba(247,147,30,.08)}
  .note-msg{margin:0;font-size:13px;line-height:1.45;color:var(--fg);white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}
  .note-meta{display:block;margin-top:5px;font-size:11px;color:var(--fg-subtle);letter-spacing:.02em}
  @media (max-width:520px){.board{left:10px;top:10px;max-height:58vh}}
  @media (prefers-reduced-motion: reduce){.board-chevron{transition:none}}
</style>
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="dawn"></div>
    <div class="aurora"></div>
    <div class="orbit"></div>
    <div class="orbit inner"></div>
    <div class="grain"></div>
  </div>

  <main>
    <span class="eyebrow"><span class="dot"></span>Launching soon · 2026</span>

    <h1 class="wordmark"><span class="roam">Roam</span><span class="wiki">Wiki</span></h1>

    <p class="tagline">The travel wiki for everyone, everywhere.</p>
    <p class="sub">A community-built guide to every city on earth — practical, local, and free. We're putting the finishing touches on it.</p>

    <p class="rotator" aria-label="Coming soon in many languages">
      <span class="label">Coming soon —</span>
      <span class="word" id="rot">곧 만나요</span>
    </p>
  </main>

  <footer>
    <span class="site">roamwiki.com</span>
    <span class="sep">·</span>
    <span>The world's travel wiki</span>
  </footer>

  <section class="board" id="board" aria-label="Guestbook">
    <button type="button" class="board-head" id="board-toggle" aria-controls="board-body" aria-expanded="true">
      <span class="board-head-text">
        <span class="board-title">Guestbook ✨</span>
        <span class="board-sub">Leave a note while we build RoamWiki.</span>
      </span>
      <span class="board-chevron" aria-hidden="true">▾</span>
    </button>
    <div class="board-body" id="board-body">
    <form class="board-form" id="board-form" novalidate>
      <textarea id="board-msg" class="board-input" rows="2" maxlength="1000" placeholder="A word of encouragement, a feature you'd love…" aria-label="Message" required></textarea>
      <input id="board-hp" class="board-hp" tabindex="-1" autocomplete="off" aria-hidden="true" placeholder="Leave this empty" />
      <div class="board-row">
        <input id="board-email" class="board-input" type="email" maxlength="200" placeholder="Email (optional · launch alert)" aria-label="Email (optional)" autocomplete="email" />
        <button type="submit" id="board-send" class="board-send">Post</button>
      </div>
    </form>
    <div class="board-list" id="board-list" aria-live="polite"></div>
    </div>
  </section>

  <script>
    (function(){
      var words = [
        "곧 만나요",        // Korean
        "coming soon",     // English
        "近日公開",         // Japanese
        "即将上线",         // Chinese
        "muy pronto",      // Spanish
        "bientôt",         // French
        "in arrivo",       // Italian
        "demnächst",       // German
        "em breve",        // Portuguese
        "قريباً",           // Arabic
        "скоро",           // Russian
        "जल्द आ रहा है"     // Hindi
      ];
      var el = document.getElementById("rot");
      if(!el) return;
      var i = 0;
      setInterval(function(){
        el.classList.add("out");
        setTimeout(function(){
          i = (i + 1) % words.length;
          el.textContent = words[i];
          // RTL-aware alignment for Arabic
          el.style.direction = (words[i] === "قريباً") ? "rtl" : "ltr";
          el.classList.remove("out");
        }, 500);
      }, 2400);
    })();
  </script>
  <!-- visitor beacon (Cloudflare Worker + D1) -->
  <script>
  (function () {
    try {
      fetch("https://roamwiki-beacon.hanms-data.workers.dev/hit", {
        method: "POST",
        keepalive: true,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ p: location.pathname, r: document.referrer }),
      }).catch(function () {});
    } catch (e) {}
  })();
  </script>
  <!-- guestbook -->
  <script>
  (function () {
    var API = "https://roamwiki-beacon.hanms-data.workers.dev";
    var root = document.getElementById("board");
    if (!root) return;
    var EMAIL = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
    var listEl = document.getElementById("board-list");
    var form = document.getElementById("board-form");
    var msgEl = document.getElementById("board-msg");
    var emailEl = document.getElementById("board-email");
    var send = document.getElementById("board-send");
    var toggle = document.getElementById("board-toggle");
    function syncToggle(){ toggle.setAttribute("aria-expanded", document.documentElement.getAttribute("data-gb") === "closed" ? "false" : "true"); }
    syncToggle();
    toggle.addEventListener("click", function(){
      var closed = document.documentElement.getAttribute("data-gb") === "closed";
      document.documentElement.setAttribute("data-gb", closed ? "open" : "closed");
      syncToggle();
    });

    function flag(cc) {
      if (!cc || cc.length !== 2) return "";
      return cc.toUpperCase().replace(/./g, function (c) {
        return String.fromCodePoint(127397 + c.charCodeAt(0));
      });
    }
    function ago(ts) {
      var t = new Date(String(ts).replace(" ", "T") + "Z").getTime();
      if (isNaN(t)) return "";
      var s = Math.max(1, (Date.now() - t) / 1000);
      if (s < 60) return "just now";
      var m = s / 60; if (m < 60) return Math.floor(m) + "m ago";
      var h = m / 60; if (h < 24) return Math.floor(h) + "h ago";
      return Math.floor(h / 24) + "d ago";
    }
    function card(n, mine) {
      var el = document.createElement("div");
      el.className = "note" + (mine ? " mine" : "");
      var p = document.createElement("p");
      p.className = "note-msg";
      p.textContent = n.message;
      var meta = document.createElement("span");
      meta.className = "note-meta";
      var fl = flag(n.country);
      meta.textContent = (fl ? fl + " · " : "") + ago(n.ts);
      el.appendChild(p);
      el.appendChild(meta);
      return el;
    }
    function empty() {
      var e = document.createElement("p");
      e.className = "board-empty";
      e.textContent = "Be the first to say hi 👋";
      return e;
    }

    fetch(API + "/notes")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        listEl.textContent = "";
        var notes = (d && d.notes) || [];
        if (!notes.length) { listEl.appendChild(empty()); return; }
        notes.forEach(function (n) { listEl.appendChild(card(n, false)); });
      })
      .catch(function () {});

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var msg = msgEl.value.trim();
      var email = emailEl.value.trim();
      var hp = document.getElementById("board-hp").value;
      if (!msg) { msgEl.focus(); return; }
      if (email && !EMAIL.test(email)) { emailEl.classList.add("err"); emailEl.focus(); return; }
      emailEl.classList.remove("err");
      send.disabled = true;
      fetch(API + "/note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ m: msg, e: email, hp: hp, p: location.pathname }),
      })
        .then(function (r) {
          if (!r.ok) { send.disabled = false; return; }
          var hint = listEl.querySelector(".board-empty");
          if (hint) hint.remove();
          listEl.insertBefore(card({ message: msg, country: null, ts: null }, true), listEl.firstChild);
          msgEl.value = "";
          emailEl.value = "";
          send.disabled = false;
        })
        .catch(function () { send.disabled = false; });
    });
  })();
  </script>
</body>
</html>
